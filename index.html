<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uswathun Hasanah</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f0f2f5;
  transition: 0.3s;
}

.dark {
  background: #121212;
  color: white;
}

.header {
  background: linear-gradient(45deg, green, #0a8f3c);
  color: white;
  text-align: center;
  padding: 20px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  animation: fade 0.4s ease;
}

.dark .card {
  background: #1e1e1e;
}

button.main {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}

.tabbar {
  display: flex;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ccc;
}

.dark .tabbar {
  background: #1e1e1e;
}

.tabbar button {
  flex: 1;
  padding: 12px;
  border: none;
  background: none;
  font-size: 14px;
}

.tabbar button.active {
  color: green;
  font-weight: bold;
}

.page {
  display: none;
  padding-bottom: 60px;
}

.activePage {
  display: block;
}

.toggle {
  position: absolute;
  top: 15px;
  right: 15px;
  background: white;
  border-radius: 20px;
  padding: 5px 10px;
  cursor: pointer;
}

.dark .toggle {
  background: #333;
  color: white;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <h3>QUVVATHUL ISLAM MADRASA</h3>
  <h2>Uswathun Hasanah</h2>
  <div class="toggle" onclick="toggleDark()">🌙</div>
</div>

<!-- HOME -->
<div id="home" class="page activePage">
  <div class="card">
    <h3>Registration</h3>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScEwSrj08sc8hA5KrerkanxRiJSl0HCpL6pT0FYSdgfK-71EQ/viewform?usp=dialog" target="_blank">
      <button class="main">Register Now</button>
    </a>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="page">
  <h3 style="padding-left:15px;">Results</h3>
  <div id="resultList"></div>
</div>

<!-- TEAM -->
<div id="team" class="page">
  <h3 style="padding-left:15px;">Team Points</h3>
  <div id="teamList"></div>
</div>

<!-- TAB -->
<div class="tabbar">
  <button onclick="showPage('home')" class="active">🏠 Home</button>
  <button onclick="showPage('result')">🏆 Result</button>
  <button onclick="showPage('team')">👥 Team</button>
</div>

<script>

let sheetID = "1n8Vwa0R-e8pyM5i4TkWrfmCRB8x7vlBm8HTFHtiAH7A";

// Tab switch
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('activePage'));
  document.getElementById(page).classList.add('activePage');

  document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// Dark mode
function toggleDark() {
  document.body.classList.toggle("dark");
}

// Result data
fetch(`https://opensheet.elk.sh/${sheetID}/Result`)
.then(res => res.json())
.then(data => {
  let div = document.getElementById("resultList");
  data.forEach(item => {
    div.innerHTML += `
      <div class="card">
        <b>${item["Name"]}</b><br>
        ${item["Program"]}<br>
        🏅 ${item["Position"]}<br>
        👥 ${item["Team"]}
      </div>`;
  });
});

// Team data
fetch(`https://opensheet.elk.sh/${sheetID}/Team`)
.then(res => res.json())
.then(data => {
  let div = document.getElementById("teamList");
  data.forEach(item => {
    div.innerHTML += `
      <div class="card">
        <b>${item["Team"]}</b><br>
        ⭐ Points: ${item["Total Points"]}
      </div>`;
  });
});

</script>

</body>
</html>
